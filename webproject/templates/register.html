<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Регистрация</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    background: url("/static/img/backweb 1.png") no-repeat center bottom;
    background-size: cover;
    font-family: sans-serif;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

.form-box{
    margin-top:80px;
    width:500px;
    background:#e9e9e9;
    border-radius:20px;
    padding:40px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    text-align:center;
}

.form-box h2{
    margin-bottom:25px;
}

.form-control{
    border-radius:20px;
    margin-bottom:15px;
}

.btn-green{
    background:#6aa84f;
    color:white;
    border:none;
    border-radius:20px;
    padding:10px 25px;
}

.btn-green:hover{
    background:#5c9445;
}
</style>
</head>

<body>

<div class="form-box">
    <h2>Регистрация</h2>

    <form method="POST" action="/register">

    <input name="name" placeholder="Имя*" class="form-control">
    <input name="surname" placeholder="Фамилия*" class="form-control">
    <input name="email" placeholder="Почта*" class="form-control">
    <input name="phone" placeholder="Телефон" class="form-control">
    <input name="login" placeholder="Логин*" class="form-control">
    <input name="password" type="password" placeholder="Пароль*" class="form-control">

    <button type="submit" class="btn-green mt-3">
        Зарегистрироваться
    </button>

    </form>
</div>

</body>
</html>
