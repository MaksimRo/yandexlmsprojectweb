<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Вход</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    background: url("/static/img/backweb 1.png") no-repeat center bottom;
    background-size: cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

.form-box{
    width:450px;
    background:#e9e9e9;
    border-radius:20px;
    padding:40px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
    text-align:center;
}

.form-control{
    border-radius:20px;
    margin-bottom:15px;
}

.btn-green{
    background:#6aa84f;
    color:white;
    border:none;
    border-radius:20px;
    padding:10px 25px;
}
</style>
</head>

<body>

<div class="form-box">
    <h2>Войти</h2>

    <form method="POST" action="/login">

    <input name="login" placeholder="Логин*" class="form-control">
    <input name="password" type="password" placeholder="Пароль*" class="form-control">

    <button type="submit" class="btn-green mt-3">
        Войти
    </button>

</form>
</div>

</body>
</html>
